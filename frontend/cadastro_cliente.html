    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-4">Cadastro de Novo Cliente</h2>
                        <form class="row g-3">
                            <div class="col-12">
                                <label for="nomeCliente" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nomeCliente" required>
                            </div>
                            <div class="col-md-6">
                                <label for="emailCliente" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="emailCliente" required>
                            </div>
                            <div class="col-md-6">
                                <label for="senhaCliente" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senhaCliente" required>
                            </div>
                            <div class="col-md-6">
                                <label for="cpfCliente" class="form-label">CPF</label>
                                <input type="text" class="form-control" id="cpfCliente" placeholder="000.000.000-00" required>
                            </div>
                             <div class="col-md-6">
                                <label for="telefoneCliente" class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="telefoneCliente" placeholder="(00) 00000-0000" required>
                            </div>
                            <div class="col-md-6">
                                <label for="sexoCliente" class="form-label">Sexo</label>
